# Despliega Cloud Functions en Firebase al hacer push a main
# Requiere: secret FIREBASE_TOKEN en el repositorio (generado con firebase login:ci)

name: Deploy Firebase Functions

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permite ejecutar manualmente desde la pestaña Actions

jobs:
  deploy:
    name: Deploy to Firebase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        working-directory: functions
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase
        run: firebase deploy --only functions --non-interactive --token "${{ secrets.FIREBASE_TOKEN }}"
